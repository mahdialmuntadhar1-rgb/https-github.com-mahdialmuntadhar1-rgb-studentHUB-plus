name = "rafid-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "rafid-db"
database_id = "30febf83-135b-4888-8e5a-461105bb590a"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "rafid-uploads"

[[queues.producers]]
binding = "OUTREACH_QUEUE"
queue = "outreach-email"

[[queues.consumers]]
queue = "outreach-email"
max_batch_size = 1

[vars]
# JWT_SECRET is intentionally not stored in this file.
# Set it with: npx wrangler secret put JWT_SECRET --config ./wrangler.toml
R2_PUBLIC_URL = "https://pub-46ad7eec395049ed8054c8804be9d032.r2.dev"
EMAIL_PROVIDER = "brevo"
EMAIL_FROM_NAME = "Talaba"
EMAIL_FROM_ADDRESS = "outreach@jamiati.com"
EMAIL_REPLY_TO = "outreach@jamiati.com"
PUBLIC_APP_URL = "https://jamiati.kaniq.org"
ADMIN_TEST_EMAIL = "admin@example.com"
DRY_RUN = "true"
TEST_MODE = "false"
BATCH_SIZE = "5"
DELAY_SECONDS = "60"
MAX_PER_DAY = "50"
DRY_RUN_AUTOMATION = "true"

[triggers]
crons = ["0 */6 * * *", "0 2 * * *"]

