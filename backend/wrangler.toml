name = "rafid-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "rafid-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "rafid-uploads"

[vars]
JWT_SECRET = "change-this-to-a-long-random-secret-minimum-32-chars"
R2_PUBLIC_URL = "https://pub-REPLACE_WITH_ACCOUNT_HASH.r2.dev/rafid-uploads"
