name = "rafid-api"
main = "worker-scraper.ts"
compatibility_date = "2026-06-11"

# Backend Worker only. Frontend deployment should be handled manually
# through Cloudflare Pages or another static host after `npm run build`.

[[d1_databases]]
binding = "DB"
database_name = "rafid-db"
database_id = "30febf83-135b-4888-8e5a-461105bb590a"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "rafid-uploads"

[triggers]
crons = ["0 */6 * * *"]

[vars]
DRY_RUN_AUTOMATION = "true"
DRY_RUN_EMAILS = "true"
