<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Jamiaati Mobile Cache</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: white;
      background: radial-gradient(circle at top, #7c3aed, #160826 55%, #05000c);
    }
    .card {
      width: min(92vw, 460px);
      padding: 26px;
      border-radius: 26px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { opacity: 0.9; line-height: 1.5; }
    button, a {
      display: inline-block;
      margin-top: 14px;
      padding: 13px 18px;
      border-radius: 999px;
      border: 0;
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .small { font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Resetting Jamiaati...</h1>
    <p>Clearing old mobile cache, old PWA data, and old service worker.</p>
    <p class="small">تنظيف الكاش القديم · پاککردنەوەی کاشی کۆن</p>
    <button onclick="resetNow()">Reset now</button>
    <br />
    <a id="go" href="/?fresh=aftermobilereset20260620">Open Jamiaati</a>
  </div>

  <script>
    async function resetNow() {
      try {
        localStorage.clear();
        sessionStorage.clear();
      } catch (e) {}

      try {
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } catch (e) {}

      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
      } catch (e) {}

      setTimeout(() => {
        window.location.href = "/?fresh=aftermobilereset20260620_" + Date.now();
      }, 700);
    }

    resetNow();
  </script>
</body>
</html>
