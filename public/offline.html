<!doctype html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Talaba Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f2ff;color:#251047;font-family:Arial,sans-serif;padding:22px;text-align:center}
    .card{max-width:420px;background:white;border-radius:26px;padding:26px;box-shadow:0 20px 70px rgba(72,38,160,.22)}
    .logo{width:74px;height:74px;margin:0 auto 14px;border-radius:24px;background:linear-gradient(135deg,#5b2fd6,#1584d6);display:grid;place-items:center;color:white;font-size:34px;font-weight:900}
    h1{font-size:24px;margin:0 0 8px}
    p{font-size:15px;line-height:1.6;margin:0;color:#5b5270}
    button{margin-top:18px;border:0;border-radius:999px;background:#5b2fd6;color:white;padding:12px 18px;font-weight:900}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">J</div>
    <h1>Talaba is offline</h1>
    <p>Please reconnect to the internet and try again.<br>تکایە پەیوەندی ئینتەرنێت بکەرەوە.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
